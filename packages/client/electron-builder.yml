# Default app/bundle id; override per build with the APP_ID env var (see scripts/with-env.mjs).
appId: app.oh-my-github
productName: Oh My GitHub
copyright: Copyright © 2026 Oh My GitHub

directories:
  output: release/${version}

files:
  - out/**/*
  - package.json
  - '!**/*.map'

asar: true
npmRebuild: false

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Signing is driven by env: with no CSC_LINK the build script sets
  # CSC_IDENTITY_AUTO_DISCOVERY=false (unsigned, no keychain prompt); set CSC_LINK +
  # CSC_KEY_PASSWORD to sign. Notarization is enabled by scripts/with-env.mjs
  # only when signing and Apple API credentials are present.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-${arch}-setup.${ext}

linux:
  category: Development
  # The scoped package name (@oh-my-github/client) is not a valid AppImage executable
  # name, so set a clean one explicitly.
  executableName: oh-my-github
  target:
    - target: AppImage
      arch:
        - x64
        - arm64

appImage:
  artifactName: ${productName}-${version}-${arch}.${ext}
